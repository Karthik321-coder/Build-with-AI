<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicStep Ultimate - Election Assistant</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tailwind Config for Dark Mode & Custom Colors -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'bounce-delay-1': 'bounce 1s infinite -0.3s',
                        'bounce-delay-2': 'bounce 1s infinite -0.15s',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Hide scrollbar for clean UI but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Transition defaults for smoother view switching */
        .view-container {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300 font-sans min-h-screen flex overflow-hidden">

    <!-- Mobile Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden lg:hidden transition-opacity cursor-pointer" onclick="toggleMobileMenu()"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 transform -translate-x-full lg:translate-x-0 lg:static lg:inset-auto bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 shadow-lg lg:shadow-none flex flex-col transition-transform duration-300 ease-in-out">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-sm text-white">
                    <i data-lucide="landmark" class="w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400">CivicStep</h1>
            </div>
            <button class="lg:hidden text-slate-500 hover:text-slate-900 dark:hover:text-white" onclick="toggleMobileMenu()">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="px-6 pb-4">
            <div class="bg-slate-100 dark:bg-slate-700/50 p-4 rounded-2xl">
                <p class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Your Progress</p>
                <div class="flex justify-between items-end mb-1">
                    <span id="nav-level" class="text-2xl font-bold text-blue-600 dark:text-blue-400">Lvl 1</span>
                    <span id="nav-xp" class="text-sm font-medium text-slate-600 dark:text-slate-300">0 XP</span>
                </div>
                <div class="w-full bg-slate-200 dark:bg-slate-600 rounded-full h-2 overflow-hidden">
                    <div id="nav-progress" class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <nav id="nav-menu" class="flex-1 px-4 space-y-1 overflow-y-auto no-scrollbar">
            <!-- Nav Items generated by JS -->
        </nav>

        <div class="p-4 border-t border-slate-200 dark:border-slate-700">
            <button onclick="toggleTheme()" class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors">
                <span class="flex items-center gap-3">
                    <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
                    <span id="theme-text">Dark Mode</span>
                </span>
                <div id="theme-toggle-bg" class="w-10 h-5 rounded-full relative transition-colors bg-slate-300">
                    <div id="theme-toggle-dot" class="absolute top-0.5 left-0.5 w-4 h-4 rounded-full bg-white transition-transform"></div>
                </div>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col min-w-0 h-screen overflow-hidden">
        <!-- Mobile Header -->
        <header class="lg:hidden flex items-center justify-between p-4 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shrink-0">
            <div class="flex items-center gap-2">
                <i data-lucide="landmark" class="w-6 h-6 text-blue-600 dark:text-blue-400"></i>
                <span class="font-bold text-xl">CivicStep</span>
            </div>
            <button onclick="toggleMobileMenu()" class="p-2 text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 rounded-lg">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </header>

        <!-- Dynamic View Container -->
        <div id="main-scroll-area" class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 relative">
            <div id="view-container" class="max-w-5xl mx-auto space-y-8 view-container pb-12">
                <!-- Content injected here by JS -->
            </div>
        </div>
    </main>

    <!-- Application Logic -->
    <script>
        // ==========================================
        // CONFIGURATION & DATA
        // ==========================================
        const apiKey = ""; // Gemini API Key injected by environment

        const timelineSteps = [
            { id: 1, title: "Spring (Year Prior)", subtitle: "Announcing Candidacy", content: "Candidates officially announce their intention to run for office, form exploratory committees, and begin fundraising and campaigning. They start testing the waters in early primary states.", icon: "info", xp: 10 },
            { id: 2, title: "January - June", subtitle: "Primaries and Caucuses", content: "States hold elections (primaries) or local gatherings (caucuses) to vote for their preferred party candidate. This process awards delegates. Iowa and New Hampshire traditionally go first.", icon: "calendar", xp: 10 },
            { id: 3, title: "July - August", subtitle: "National Conventions", content: "Political parties hold large, televised conventions to officially nominate their candidate for President and Vice President based on delegate counts, and to finalize their party platform.", icon: "landmark", xp: 10 },
            { id: 4, title: "September - October", subtitle: "General Campaigning & Debates", content: "The official nominees campaign nationwide, focusing heavily on 'swing states'. They participate in televised debates to present their platforms directly to the American public.", icon: "message-square", xp: 10 },
            { id: 5, title: "Early November", subtitle: "Election Day", content: "Citizens across the country cast their ballots on the first Tuesday after the first Monday in November. The popular vote in each state determines which electors are sent to the Electoral College.", icon: "check-circle", xp: 10 },
            { id: 6, title: "December", subtitle: "Electoral College Vote", content: "Electors meet in their respective states to cast their official votes for President and Vice President. A candidate needs an absolute majority (270 out of 538 electoral votes) to win.", icon: "award", xp: 10 },
            { id: 7, title: "January 20", subtitle: "Inauguration Day", content: "The newly elected President and Vice President take the oath of office at the US Capitol, officially beginning their four-year term.", icon: "clock", xp: 10 }
        ];

        const quizData = [
            { q: "What is the primary purpose of a National Convention?", opts: ["Elect the President", "Nominate a party candidate", "Cast Electoral votes", "Register voters"], ans: 1, exp: "Conventions lock in nominees based on primary results." },
            { q: "How many Electoral College votes are needed to win?", opts: ["270", "538", "100", "50"], ans: 0, exp: "There are 538 total electoral votes. A simple majority of 270 is required." },
            { q: "When is General Election Day?", opts: ["Oct 1st", "1st Tuesday after 1st Monday in Nov", "Last Friday in Nov", "Jan 20th"], ans: 1, exp: "By law, it's the Tuesday following the first Monday in November." },
            { q: "What is a swing state?", opts: ["A state with no voting machines", "A state that reliably votes for one party", "A state where either major party has a good chance of winning", "A state that changes its borders"], ans: 2, exp: "Swing states (or battleground states) are heavily targeted by campaigns because their outcomes are unpredictable." },
            { q: "Who breaks a tie in the Electoral College?", opts: ["The Supreme Court", "The sitting Vice President", "The House of Representatives", "A national popular vote revote"], ans: 2, exp: "If no candidate gets 270 votes, the House of Representatives elects the President (each state delegation gets one vote)." }
        ];

        const glossaryTerms = [
            { term: "Absentee Ballot", def: "A ballot completed and typically mailed in advance of an election by a voter who is unable to be present at the polls." },
            { term: "Caucus", def: "A local meeting where registered members of a political party in a city, town or county gather to vote for their preferred party candidate." },
            { term: "Incumbent", def: "The person currently holding office." },
            { term: "PAC", def: "Political Action Committee; an organization formed to collect money and provide financial support for political candidates." },
            { term: "Gerrymandering", def: "The manipulation of the boundaries of an electoral constituency so as to favor one party or class." }
        ];

        const dailyFacts = [
            "George Washington is the only U.S. president to have been elected unanimously by the Electoral College.",
            "The 15th, 19th, and 26th Amendments significantly expanded voting rights in the US.",
            "Election Day is on a Tuesday because in the 1800s, it gave farmers a day to travel after Sunday church.",
            "Alaska was the first state to allow 18-year-olds to vote, even before the 26th Amendment."
        ];

        const navItems = [
            { id: 'dashboard', label: 'Dashboard', icon: 'trophy' },
            { id: 'timeline', label: 'Journey Timeline', icon: 'calendar' },
            { id: 'assistant', label: 'AI Assistant', icon: 'zap' },
            { id: 'quiz', label: 'Knowledge Check', icon: 'help-circle' },
            { id: 'glossary', label: 'Glossary', icon: 'book-text' },
            { id: 'resources', label: 'Voter Hub', icon: 'map-pin' },
        ];

        // ==========================================
        // STATE MANAGEMENT
        // ==========================================
        let state = {
            activeView: 'dashboard',
            isDarkMode: false,
            isMobileMenuOpen: false,
            userStats: { xp: 0, level: 1, timelineRead: [], quizHighscore: 0, aiChats: 0, badges: [] },
            
            // View Specific States
            timeline: { expandedId: null },
            chat: { 
                messages: [{ role: 'assistant', text: "Hello! I'm CivicStep AI powered by Gemini. Ask me anything about voting rules, timelines, or political processes." }], 
                isLoading: false, 
                isELI5: false 
            },
            quiz: { currentQ: 0, selectedOpt: null, showExp: false, score: 0, streak: 0, quizDone: false },
            glossary: { search: '' },
            resources: { selectedState: 'California' }
        };

        // ==========================================
        // CORE FUNCTIONS
        // ==========================================
        function initApp() {
            // Load Persistence
            const savedStats = localStorage.getItem('civicStepStats');
            const savedTheme = localStorage.getItem('civicStepTheme');
            if (savedStats) state.userStats = JSON.parse(savedStats);
            if (savedTheme === 'dark') state.isDarkMode = true;

            applyTheme();
            renderNavigation();
            renderView();
        }

        function saveState() {
            localStorage.setItem('civicStepStats', JSON.stringify(state.userStats));
            localStorage.setItem('civicStepTheme', state.isDarkMode ? 'dark' : 'light');
            updateSidebarStats();
        }

        function awardXP(amount, reason) {
            state.userStats.xp += amount;
            state.userStats.level = Math.floor(state.userStats.xp / 100) + 1;
            
            // Check badges
            if (state.userStats.timelineRead.length === timelineSteps.length && !state.userStats.badges.includes('Historian')) state.userStats.badges.push('Historian');
            if (state.userStats.quizHighscore === quizData.length && !state.userStats.badges.includes('Quiz Master')) state.userStats.badges.push('Quiz Master');
            if (state.userStats.aiChats >= 5 && !state.userStats.badges.includes('Curious Mind')) state.userStats.badges.push('Curious Mind');

            saveState();
        }

        function navigateTo(viewId) {
            state.activeView = viewId;
            state.isMobileMenuOpen = false;
            updateMobileMenuUI();
            renderNavigation();
            renderView();
            // Scroll to top
            document.getElementById('main-scroll-area').scrollTop = 0;
        }

        // ==========================================
        // UI RENDERING
        // ==========================================
        
        function applyTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark', state.isDarkMode);
            
            // Update Toggle Button UI
            document.getElementById('theme-icon').setAttribute('data-lucide', state.isDarkMode ? 'sun' : 'moon');
            document.getElementById('theme-text').textContent = state.isDarkMode ? 'Light Mode' : 'Dark Mode';
            
            const bg = document.getElementById('theme-toggle-bg');
            const dot = document.getElementById('theme-toggle-dot');
            
            if (state.isDarkMode) {
                bg.classList.replace('bg-slate-300', 'bg-blue-600');
                dot.classList.add('translate-x-5');
            } else {
                bg.classList.replace('bg-blue-600', 'bg-slate-300');
                dot.classList.remove('translate-x-5');
            }
            lucide.createIcons();
        }

        function toggleTheme() {
            state.isDarkMode = !state.isDarkMode;
            saveState();
            applyTheme();
            if(state.activeView === 'dashboard') renderView(); // Re-render to update dynamic charts if any
        }

        function toggleMobileMenu() {
            state.isMobileMenuOpen = !state.isMobileMenuOpen;
            updateMobileMenuUI();
        }

        function updateMobileMenuUI() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (state.isMobileMenuOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function updateSidebarStats() {
            document.getElementById('nav-level').textContent = `Lvl ${state.userStats.level}`;
            document.getElementById('nav-xp').textContent = `${state.userStats.xp} XP`;
            document.getElementById('nav-progress').style.width = `${state.userStats.xp % 100}%`;
        }

        function renderNavigation() {
            updateSidebarStats();
            const navMenu = document.getElementById('nav-menu');
            navMenu.innerHTML = navItems.map(item => `
                <button onclick="navigateTo('${item.id}')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium transition-all duration-200 ${
                    state.activeView === item.id 
                    ? 'bg-blue-50 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400' 
                    : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700/50 hover:text-slate-900 dark:hover:text-white'
                }">
                    <i data-lucide="${item.icon}" class="w-5 h-5 ${state.activeView === item.id ? 'text-blue-600 dark:text-blue-400' : ''}"></i>
                    ${item.label}
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderView() {
            const container = document.getElementById('view-container');
            // Re-trigger animation
            container.classList.remove('view-container');
            void container.offsetWidth; // trigger reflow
            container.classList.add('view-container');

            switch(state.activeView) {
                case 'dashboard': container.innerHTML = getDashboardHTML(); break;
                case 'timeline': container.innerHTML = getTimelineHTML(); break;
                case 'assistant': 
                    container.innerHTML = getAssistantHTML(); 
                    scrollToBottom('chat-messages');
                    break;
                case 'quiz': container.innerHTML = getQuizHTML(); break;
                case 'glossary': container.innerHTML = getGlossaryHTML(); break;
                case 'resources': container.innerHTML = getResourcesHTML(); break;
            }
            lucide.createIcons();
        }

        // ==========================================
        // VIEW HTML GENERATORS
        // ==========================================

        // --- Dashboard ---
        function getDashboardHTML() {
            const fact = dailyFacts[Math.floor(Math.random() * dailyFacts.length)]; // Made random for interactiveness
            const overallProgress = Math.round(((state.userStats.timelineRead.length + (state.userStats.quizHighscore > 0 ? 1 : 0)) / (timelineSteps.length + 1)) * 100);
            
            const badgesHTML = state.userStats.badges.length > 0 
                ? state.userStats.badges.map(b => `<span class="bg-indigo-100 dark:bg-indigo-900/50 text-indigo-700 dark:text-indigo-300 text-xs px-2 py-1 rounded-md font-bold">${b}</span>`).join('')
                : `<span class="text-sm text-slate-400 italic">No badges yet. Start exploring!</span>`;

            return `
                <div class="space-y-6">
                    <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 text-white shadow-lg relative overflow-hidden">
                        <div class="relative z-10">
                            <h2 class="text-3xl font-black mb-2">Welcome to CivicStep!</h2>
                            <p class="text-blue-100 text-lg max-w-xl mb-6">Your interactive, AI-powered journey to mastering the democratic process. Perfect for the Prompt Wars challenge.</p>
                            <button onclick="navigateTo('timeline')" class="bg-white text-blue-700 px-6 py-3 rounded-xl font-bold hover:bg-blue-50 transition-colors shadow-sm">
                                Start Learning
                            </button>
                        </div>
                        <i data-lucide="landmark" class="absolute right-[-10%] top-[-10%] w-64 h-64 text-white opacity-10 transform -rotate-12"></i>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="col-span-1 md:col-span-2 bg-white dark:bg-slate-800 rounded-3xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col justify-center">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center gap-2 text-amber-500">
                                    <i data-lucide="star" class="w-5 h-5 fill-current"></i>
                                    <span class="font-bold uppercase tracking-wider text-sm">Random Civic Fact</span>
                                </div>
                                <button onclick="renderView()" class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors" title="Get a new fact">
                                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <p class="text-xl font-medium text-slate-800 dark:text-slate-200 leading-relaxed">"${fact}"</p>
                        </div>

                        <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
                            <h3 class="font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                                <i data-lucide="trophy" class="w-5 h-5 text-blue-500"></i> Your Stats
                            </h3>
                            <div class="space-y-4">
                                <div>
                                    <div class="flex justify-between text-sm mb-1 text-slate-600 dark:text-slate-400">
                                        <span>Overall Journey</span>
                                        <span class="font-bold">${overallProgress}%</span>
                                    </div>
                                    <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2">
                                        <div class="bg-green-500 h-2 rounded-full transition-all duration-1000" style="width: ${overallProgress}%"></div>
                                    </div>
                                </div>
                                <div class="pt-4 border-t border-slate-100 dark:border-slate-700">
                                    <span class="text-xs text-slate-500 block mb-2 uppercase font-bold">Unlocked Badges</span>
                                    <div class="flex flex-wrap gap-2">${badgesHTML}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800 rounded-3xl p-6 text-center">
                        <h3 class="font-bold text-indigo-900 dark:text-indigo-300 mb-2">Prompt Wars Challenge Tracker</h3>
                        <p class="text-sm text-indigo-700 dark:text-indigo-400 mb-4">Complete modules to level up and generate your "Build-in-Public" Narrative post.</p>
                        <button onclick="generateLinkedInPost()" class="inline-flex items-center gap-2 bg-[#0a66c2] text-white px-5 py-2.5 rounded-xl font-medium hover:bg-[#084e96] transition-colors">
                            <i data-lucide="share-2" class="w-4 h-4"></i> Generate LinkedIn Update
                        </button>
                    </div>
                </div>
            `;
        }

        function generateLinkedInPost() {
            const text = `I just built my civic knowledge using the CivicStep AI Assistant for the #GoogleDevelopers #BuildWithAI Prompt Wars challenge! 🚀\n\nI've reached Level ${state.userStats.level} with ${state.userStats.xp} XP and unlocked ${state.userStats.badges.length} badges. My favorite feature is the ELI5 Gemini AI integration.\n\nCheck out my build journey! 👇\n#AI #HTML #Hackathon #CivicTech`;
            window.open(`https://www.linkedin.com/feed/?shareActive=true&text=${encodeURIComponent(text)}`, '_blank');
        }

        // --- Timeline ---
        function getTimelineHTML() {
            let html = `
                <div class="max-w-3xl mx-auto">
                    <div class="mb-8 text-center">
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3">Path to the Presidency</h2>
                        <p class="text-slate-600 dark:text-slate-400 max-w-2xl mx-auto">Explore the chronological journey of a US election. Read through all sections to earn the "Historian" badge.</p>
                    </div>
                    <div class="relative border-l-2 border-slate-200 dark:border-slate-700 ml-4 md:ml-8 space-y-6 pb-8">
            `;

            timelineSteps.forEach(step => {
                const isExpanded = state.timeline.expandedId === step.id;
                const isRead = state.userStats.timelineRead.includes(step.id);
                
                const dotColor = isRead ? 'bg-green-500 border-green-500' : isExpanded ? 'bg-blue-600 border-blue-600' : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-600';
                const cardBorder = isExpanded ? 'border-blue-400 shadow-md ring-2 ring-blue-100 dark:ring-blue-900/30' : 'border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-500 hover:shadow-sm';
                const iconBg = isExpanded ? 'bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300' : 'bg-slate-100 text-slate-500 dark:bg-slate-700 dark:text-slate-400';
                const contentHeight = isExpanded ? 'grid-rows-[1fr] opacity-100 mt-3' : 'grid-rows-[0fr] opacity-0';
                const chevronRot = isExpanded ? 'rotate-90' : '';

                html += `
                    <div class="relative pl-8 md:pl-12 group">
                        <div class="absolute left-[-9px] top-4 w-4 h-4 rounded-full border-2 transition-colors duration-300 ${dotColor}"></div>
                        <button onclick="handleTimelineClick(${step.id}, ${step.xp})" class="w-full text-left outline-none block">
                            <div class="bg-white dark:bg-slate-800 rounded-2xl border transition-all duration-300 overflow-hidden ${cardBorder}">
                                <div class="p-5 flex items-start gap-4">
                                    <div class="hidden sm:flex mt-1 p-3 rounded-xl transition-colors ${iconBg}">
                                        <i data-lucide="${step.icon}" class="w-5 h-5"></i>
                                    </div>
                                    <div class="flex-1">
                                        <div class="flex items-center justify-between mb-1">
                                            <span class="text-xs font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest">${step.title}</span>
                                            <div class="flex items-center gap-2">
                                                ${isRead ? `<span class="text-xs font-bold text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/30 px-2 py-1 rounded-md">+${step.xp} XP Done</span>` : ''}
                                                <i data-lucide="chevron-right" class="w-5 h-5 text-slate-400 transition-transform duration-300 ${chevronRot}"></i>
                                            </div>
                                        </div>
                                        <h3 class="text-xl font-bold text-slate-900 dark:text-white">${step.subtitle}</h3>
                                        <div class="grid transition-all duration-300 ease-in-out ${contentHeight}">
                                            <div class="overflow-hidden">
                                                <p class="text-slate-600 dark:text-slate-300 leading-relaxed pt-2 border-t border-slate-100 dark:border-slate-700">${step.content}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </button>
                    </div>
                `;
            });
            html += `</div></div>`;
            return html;
        }

        window.handleTimelineClick = function(id, xpAmount) {
            state.timeline.expandedId = state.timeline.expandedId === id ? null : id;
            if (!state.userStats.timelineRead.includes(id)) {
                // Simulate read delay
                setTimeout(() => {
                    if(!state.userStats.timelineRead.includes(id)){
                        state.userStats.timelineRead.push(id);
                        awardXP(xpAmount, 'Read timeline step');
                        renderView();
                        updateSidebarStats();
                    }
                }, 800);
            }
            renderView(); // re-render immediately for accordion effect
        };

        // --- Assistant ---
        function getAssistantHTML() {
            let messagesHTML = state.chat.messages.map((msg) => {
                const isUser = msg.role === 'user';
                const align = isUser ? 'justify-end' : 'justify-start';
                const style = isUser ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-200 border border-slate-100 dark:border-slate-700 rounded-tl-none';
                // Simple markdown bold conversion
                const textHTML = msg.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br/>');
                
                let ttsBtn = '';
                if (!isUser) {
                    ttsBtn = `<button onclick="speakText(\`${msg.text.replace(/["'`]/g, '')}\`)" class="self-start ml-2 text-slate-400 hover:text-blue-600 transition-colors flex items-center gap-1 text-xs mt-1"><i data-lucide="volume-2" class="w-3 h-3"></i> Read aloud</button>`;
                }

                return `
                    <div class="flex ${align}">
                        <div class="flex flex-col gap-1 max-w-[85%] md:max-w-[75%]">
                            <div class="rounded-2xl p-4 shadow-sm ${style} text-sm leading-relaxed">${textHTML}</div>
                            ${ttsBtn}
                        </div>
                    </div>
                `;
            }).join('');

            if (state.chat.isLoading) {
                messagesHTML += `
                    <div class="flex justify-start">
                        <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl rounded-tl-none p-4 shadow-sm flex items-center gap-2">
                            <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce-delay-1"></div>
                            <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce-delay-2"></div>
                            <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce"></div>
                        </div>
                    </div>
                `;
            }

            const presets = ["How does the Electoral College work?", "What is Gerrymandering?", "Difference between primary and caucus?"];
            let suggestionsHTML = '';
            if (state.chat.messages.length < 3 && !state.chat.isLoading) {
                suggestionsHTML = `
                    <div class="px-4 py-3 bg-white dark:bg-slate-800 border-t border-slate-100 dark:border-slate-700 flex gap-2 overflow-x-auto no-scrollbar">
                        ${presets.map(q => `<button onclick="handlePresetClick('${q}')" class="whitespace-nowrap text-xs font-medium text-blue-700 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/30 border border-blue-100 dark:border-blue-800 px-3 py-2 rounded-xl hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-colors">${q}</button>`).join('')}
                    </div>
                `;
            }

            const eli5Classes = state.chat.isELI5 ? 'bg-amber-100 border-amber-300 text-amber-800 dark:bg-amber-900/50 dark:border-amber-700 dark:text-amber-300' : 'bg-slate-100 border-slate-200 text-slate-600 dark:bg-slate-700 dark:border-slate-600 dark:text-slate-300';
            
            return `
                <div class="max-w-4xl mx-auto h-[calc(100vh-140px)] min-h-[600px] flex flex-col bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                    <div class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700 p-4 flex flex-wrap justify-between items-center gap-4">
                        <div class="flex items-center gap-3">
                            <div class="bg-blue-600 p-2 rounded-xl text-white"><i data-lucide="zap" class="w-5 h-5"></i></div>
                            <div>
                                <h2 class="font-bold text-slate-900 dark:text-white">CivicStep Assistant</h2>
                                <p class="text-xs text-slate-500 dark:text-slate-400">Gemini 2.5 Flash</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="toggleELI5()" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors border ${eli5Classes}">
                                ELI5 Mode ${state.chat.isELI5 ? 'ON' : 'OFF'}
                            </button>
                            <button onclick="exportChat()" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-lg transition-colors" title="Export Chat">
                                <i data-lucide="download" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>

                    <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-6 bg-slate-50 dark:bg-slate-900/20">
                        ${messagesHTML}
                    </div>

                    ${suggestionsHTML}

                    <div class="p-4 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700">
                        <form onsubmit="handleChatSubmit(event)" class="flex gap-3 relative">
                            <input type="text" id="chat-input" placeholder="${state.chat.isELI5 ? "Ask a simple question..." : "Ask about the election process..."}" class="flex-1 bg-slate-100 dark:bg-slate-900 dark:text-white border-transparent focus:bg-white dark:focus:bg-slate-800 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 dark:focus:ring-blue-900/30 rounded-xl px-4 py-3 outline-none transition-all duration-200" ${state.chat.isLoading ? 'disabled' : ''} autocomplete="off" />
                            <button type="submit" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center min-w-[50px] shadow-sm" ${state.chat.isLoading ? 'disabled' : ''}>
                                <i data-lucide="send" class="w-5 h-5"></i>
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function scrollToBottom(id) {
            setTimeout(() => {
                const el = document.getElementById(id);
                if(el) el.scrollTop = el.scrollHeight;
            }, 50);
        }

        window.toggleELI5 = function() {
            state.chat.isELI5 = !state.chat.isELI5;
            renderView();
        }

        window.speakText = function(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Text-to-speech is not supported in this browser.");
            }
        }

        window.exportChat = function() {
            const textContent = state.chat.messages.map(m => `${m.role.toUpperCase()}:\n${m.text}\n\n`).join('');
            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'CivicStep_Chat_Export.txt';
            a.click();
        }

        window.handlePresetClick = function(q) {
            document.getElementById('chat-input').value = q;
        }

        window.handleChatSubmit = async function(e) {
            e.preventDefault();
            const inputEl = document.getElementById('chat-input');
            const text = inputEl.value.trim();
            if(!text || state.chat.isLoading) return;

            inputEl.value = '';
            state.chat.messages.push({ role: 'user', text: text });
            state.chat.isLoading = true;
            renderView();

            const response = await fetchGeminiResponse(text);
            
            state.chat.messages.push({ role: 'assistant', text: response });
            state.chat.isLoading = false;
            
            state.userStats.aiChats++;
            awardXP(5, 'Used AI Assistant');
            renderView();
        }

        async function fetchGeminiResponse(userMessage) {
            // Failsafe for empty API key - Simulate response for demo purposes if key is empty
            if (!apiKey) {
                return new Promise(res => setTimeout(() => res("*(Note: Gemini API key is missing. This is a simulated response.)*\n\nThat's a great question about the election process. Elections are the cornerstone of democracy, allowing citizens to choose their representatives. " + (state.chat.isELI5 ? "Think of it like choosing the captain of your kickball team!" : "The process involves strict rules to ensure fairness and transparency.")), 1500));
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const baseSys = "You are CivicStep AI, an educational assistant helping users understand the democratic election process. Be factual, strictly neutral, and avoid partisan bias.";
            const eli5 = " Explain this like I am a 5-year-old child using simple analogies and very simple words.";
            
            const payload = {
                contents: [{ parts: [{ text: userMessage }] }],
                systemInstruction: { parts: [{ text: baseSys + (state.chat.isELI5 ? eli5 : " Provide concise, structured answers.") }] }
            };

            const delay = ms => new Promise(res => setTimeout(res, ms));
            const backoff = [1000, 2000, 4000, 8000, 16000];

            for (let i = 0; i < 6; i++) {
                try {
                    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!res.ok) throw new Error(`HTTP error`);
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Error generating response.";
                } catch (err) {
                    if (i === 5) return "I'm currently experiencing high API traffic. Please try again later.";
                    await delay(backoff[i]);
                }
            }
        }


        // --- Quiz ---
        function getQuizHTML() {
            const quiz = state.quiz;
            
            if (quiz.quizDone) {
                const isPerfect = quiz.score === quizData.length;
                return `
                    <div class="max-w-2xl mx-auto mt-8 bg-white dark:bg-slate-800 rounded-3xl p-10 text-center shadow-lg border border-slate-200 dark:border-slate-700 relative overflow-hidden">
                        ${isPerfect ? `<div class="absolute inset-0 pointer-events-none bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxjaXJjbGUgY3g9IjEwJSIgY3k9IjEwJSIgcj0iNSIgZmlsbD0iI2ZiYmYyNCIvPjxjaXJjbGUgY3g9IjIwJSIgY3k9IjMwJSIgcj0iNSIgZmlsbD0iIzYwYTVmYSIvPjxjaXJjbGUgY3g9IjgwJSIgY3k9IjIwJSIgcj0iNSIgZmlsbD0iIzM0ZDM5OSIvPjxjaXJjbGUgY3g9IjkwJSIgY3k9IjgwJSIgcj0iNSIgZmlsbD0iI2Y4NzE3MSIvPjwvc3ZnPg==')] opacity-50"></div>` : ''}
                        
                        <div class="w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner ${isPerfect ? 'bg-amber-100 dark:bg-amber-900/30 text-amber-500' : 'bg-blue-100 dark:bg-blue-900/30 text-blue-600'}">
                            <i data-lucide="trophy" class="w-12 h-12"></i>
                        </div>
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-2">Quiz Complete!</h2>
                        <p class="text-xl text-slate-600 dark:text-slate-400 mb-8">
                            You scored <span class="font-black text-blue-600 dark:text-blue-400 text-3xl mx-2">${quiz.score}</span> / ${quizData.length}
                        </p>
                        
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <div class="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl">
                                <p class="text-sm text-slate-500 dark:text-slate-400 mb-1">XP Earned</p>
                                <p class="text-2xl font-bold text-green-500">+${quiz.score * 20}</p>
                            </div>
                            <div class="bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl">
                                <p class="text-sm text-slate-500 dark:text-slate-400 mb-1">Accuracy</p>
                                <p class="text-2xl font-bold text-blue-500">${Math.round((quiz.score/quizData.length)*100)}%</p>
                            </div>
                        </div>

                        <button onclick="resetQuiz()" class="w-full sm:w-auto bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold px-8 py-4 rounded-xl hover:bg-slate-800 dark:hover:bg-slate-100 transition-colors shadow-md">
                            Retry Knowledge Check
                        </button>
                    </div>
                `;
            }

            const q = quizData[quiz.currentQ];
            let optionsHTML = '';
            
            q.opts.forEach((opt, idx) => {
                let btnClass = "w-full text-left p-5 rounded-2xl border-2 transition-all duration-200 font-medium ";
                if (!quiz.showExp) {
                    btnClass += "border-slate-200 dark:border-slate-700 hover:border-blue-400 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-slate-700 cursor-pointer";
                } else if (idx === q.ans) {
                    btnClass += "border-green-500 bg-green-50 text-green-900 dark:bg-green-900/20 dark:text-green-400";
                } else if (idx === quiz.selectedOpt) {
                    btnClass += "border-red-500 bg-red-50 text-red-900 dark:bg-red-900/20 dark:text-red-400";
                } else {
                    btnClass += "border-slate-200 dark:border-slate-700 opacity-50 dark:text-slate-400";
                }

                optionsHTML += `
                    <button onclick="handleQuizSelect(${idx})" ${quiz.showExp ? 'disabled' : ''} class="${btnClass}">
                        <div class="flex justify-between items-center">
                            <span class="text-lg">${opt}</span>
                            ${quiz.showExp && idx === q.ans ? '<i data-lucide="check-circle" class="w-6 h-6 text-green-500"></i>' : ''}
                        </div>
                    </button>
                `;
            });

            return `
                <div class="max-w-3xl mx-auto">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 class="text-2xl font-black text-slate-900 dark:text-white">Knowledge Check</h2>
                            ${quiz.streak > 1 ? `<span class="text-sm font-bold text-orange-500 flex items-center gap-1 mt-1"><i data-lucide="zap" class="w-4 h-4 fill-current"></i> ${quiz.streak}x Streak!</span>` : ''}
                        </div>
                        <span class="bg-blue-100 text-blue-800 dark:bg-blue-900/50 dark:text-blue-300 px-4 py-1.5 rounded-full text-sm font-bold">
                            ${quiz.currentQ + 1} / ${quizData.length}
                        </span>
                    </div>

                    <div class="w-full bg-slate-200 dark:bg-slate-700 h-2 rounded-full mb-8 overflow-hidden">
                        <div class="bg-blue-600 h-full transition-all duration-300" style="width: ${(quiz.currentQ / quizData.length) * 100}%"></div>
                    </div>

                    <div class="bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 md:p-8">
                        <h3 class="text-2xl font-bold text-slate-900 dark:text-white mb-8 leading-snug">${q.q}</h3>
                        <div class="space-y-3">${optionsHTML}</div>

                        ${quiz.showExp ? `
                            <div class="mt-8 animate-fade-in bg-slate-50 dark:bg-slate-900 rounded-2xl p-6 border border-slate-100 dark:border-slate-700">
                                <p class="font-black text-lg mb-2 ${quiz.selectedOpt === q.ans ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400'}">
                                    ${quiz.selectedOpt === q.ans ? '🎯 Spot on!' : '❌ Not quite.'}
                                </p>
                                <p class="text-slate-700 dark:text-slate-300 leading-relaxed mb-6">${q.exp}</p>
                                <button onclick="handleQuizNext()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-colors flex justify-center items-center gap-2 shadow-md">
                                    ${quiz.currentQ < quizData.length - 1 ? 'Next Question' : 'View Final Score'}
                                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                                </button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        window.handleQuizSelect = function(idx) {
            if(state.quiz.showExp) return;
            state.quiz.selectedOpt = idx;
            state.quiz.showExp = true;
            
            if (idx === quizData[state.quiz.currentQ].ans) {
                state.quiz.score++;
                state.quiz.streak++;
                awardXP(20 + (state.quiz.streak * 5), 'Correct Answer Bonus');
            } else {
                state.quiz.streak = 0;
            }
            renderView();
        }

        window.handleQuizNext = function() {
            if (state.quiz.currentQ < quizData.length - 1) {
                state.quiz.currentQ++;
                state.quiz.selectedOpt = null;
                state.quiz.showExp = false;
            } else {
                state.quiz.quizDone = true;
                if (state.quiz.score > state.userStats.quizHighscore) {
                    state.userStats.quizHighscore = state.quiz.score;
                    saveState();
                }
            }
            renderView();
        }

        window.resetQuiz = function() {
            state.quiz = { currentQ: 0, selectedOpt: null, showExp: false, score: 0, streak: 0, quizDone: false };
            renderView();
        }

        // --- Glossary ---
        function getGlossaryHTML() {
            const filtered = glossaryTerms.filter(t => t.term.toLowerCase().includes(state.glossary.search.toLowerCase()) || t.def.toLowerCase().includes(state.glossary.search.toLowerCase()));
            
            let listHTML = filtered.map(item => `
                <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl border border-slate-200 dark:border-slate-700 hover:shadow-md transition-shadow">
                    <h3 class="text-xl font-bold text-blue-600 dark:text-blue-400 mb-2">${item.term}</h3>
                    <p class="text-slate-600 dark:text-slate-300 leading-relaxed">${item.def}</p>
                </div>
            `).join('');

            if(filtered.length === 0) {
                listHTML = `<div class="col-span-2 text-center py-12 text-slate-500 dark:text-slate-400">No terms found matching "${state.glossary.search}". Try asking the AI Assistant!</div>`;
            }

            return `
                <div class="max-w-4xl mx-auto">
                    <div class="mb-8">
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3">Election Glossary</h2>
                        <p class="text-slate-600 dark:text-slate-400">Master the vocabulary of democracy.</p>
                    </div>
                    <div class="relative mb-8 shadow-sm">
                        <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5 text-slate-400"></i>
                        <input type="text" placeholder="Search terms like 'Caucus' or 'PAC'..." value="${state.glossary.search}" oninput="handleGlossarySearch(this.value)" class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl pl-12 pr-4 py-4 text-lg outline-none focus:ring-2 focus:ring-blue-500 dark:text-white transition-all" />
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        ${listHTML}
                    </div>
                </div>
            `;
        }

        window.handleGlossarySearch = function(val) {
            state.glossary.search = val;
            // Debounce not strictly needed for small local array, render immediately
            renderView(); 
            // Small hack to retain focus after re-render:
            setTimeout(() => {
               const input = document.querySelector('input[placeholder*="Search terms"]');
               if(input) { input.focus(); input.setSelectionRange(val.length, val.length); }
            }, 10);
        }

        // --- Resources ---
        function getResourcesHTML() {
            const states = ["California", "Texas", "Florida", "New York", "Pennsylvania"];
            const selState = state.resources.selectedState;

            return `
                <div class="max-w-3xl mx-auto">
                    <div class="mb-8 text-center">
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3">Voter Resource Hub</h2>
                        <p class="text-slate-600 dark:text-slate-400">Simulated resource portal for voter registration deadlines.</p>
                    </div>
                    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 md:p-8 shadow-sm border border-slate-200 dark:border-slate-700 text-center">
                        <i data-lucide="map-pin" class="w-12 h-12 text-blue-500 mx-auto mb-4"></i>
                        <h3 class="text-xl font-bold mb-4 dark:text-white">Select Your State</h3>
                        <select onchange="handleStateSelect(this.value)" class="w-full max-w-xs mx-auto block bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white rounded-xl px-4 py-3 outline-none focus:border-blue-500 mb-8 cursor-pointer">
                            ${states.map(s => `<option value="${s}" ${s === selState ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                        <div class="grid sm:grid-cols-2 gap-4 text-left">
                            <div class="bg-blue-50 dark:bg-blue-900/20 p-5 rounded-2xl border border-blue-100 dark:border-blue-800">
                                <h4 class="font-bold text-blue-900 dark:text-blue-300 mb-1">Registration Deadline</h4>
                                <p class="text-blue-700 dark:text-blue-400">Typically 15-30 days before Election Day in ${selState}.</p>
                            </div>
                            <div class="bg-green-50 dark:bg-green-900/20 p-5 rounded-2xl border border-green-100 dark:border-green-800">
                                <h4 class="font-bold text-green-900 dark:text-green-300 mb-1">Early Voting</h4>
                                <p class="text-green-700 dark:text-green-400">Rules vary. Check local ${selState} county websites.</p>
                            </div>
                        </div>
                        <button onclick="window.open('https://vote.gov', '_blank')" class="mt-8 w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                            Visit Official Vote.gov Portal <i data-lucide="external-link" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        window.handleStateSelect = function(val) {
            state.resources.selectedState = val;
            renderView();
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', initApp);

    </script>
</body>
</html>
